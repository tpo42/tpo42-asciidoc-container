name: Build, validate and publish container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Semver tag to publish (e.g. v1.2.3)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tpo42/adoc
  TEST_TAG: tpo42/adoc:ci-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Containerfile
          load: true
          tags: ${{ env.TEST_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test script syntax
        run: |
          bash -n bin/adcw
          bash -n bin/adcbw
          bash -n lib/adcw-common.bash
          echo "Syntax OK"

      - name: Test adcw
        run: test/shell-function.bash

      - name: Validate ADRs
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/workspace" \
            "${{ env.TEST_TAG }}" \
            validate --strict -i 'adr/*.adoc'

      - name: Resolve version from tag
        id: version
        if: inputs.tag != '' || startsWith(github.ref, 'refs/tags/v')
        run: |
          RAW_TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${RAW_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"
          {
            echo "version=${VERSION}"
            echo "major=${MAJOR}"
            echo "minor=${MAJOR}.${MINOR}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.version != '' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.minor != '' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.major != '' }}
            type=sha

      - name: Build and push (multi-platform)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
